name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore app/slightNeko.keystore \
            -alias slightNeko -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=NekoSense, OU=Dev, O=SlightNeko, L=Unknown, ST=Unknown, C=CN"
          echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
          echo "KEY_ALIAS=slightNeko" >> $GITHUB_ENV
          echo "KEY_PASSWORD=android" >> $GITHUB_ENV

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NekoSense-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
